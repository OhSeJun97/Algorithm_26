<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closest Pair of Points Visualizer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Closest Pair of Points Visualizer</h1>
        
        <div class="controls">
            <label for="point-count">Number of Points (n):</label>
            <input type="number" id="point-count" value="100" min="2" max="5000">
            <button id="generate-btn">Generate Random</button>
            <button id="find-btn" disabled>Find Closest Pair</button>
        </div>

        <div class="visualizer">
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>

        <div class="results">
            <div class="result-card">
                <h3>Brute Force (O(n²))</h3>
                <p id="bf-time">Execution Time: - ms</p>
                <p id="bf-dist">Min Distance: -</p>
            </div>
            <div class="result-card">
                <h3>Divide & Conquer (O(n log² n))</h3>
                <p id="dc-time">Execution Time: - ms</p>
                <p id="dc-dist">Min Distance: -</p>
            </div>
        </div>
        
        <div id="speedup" class="speedup-box">
            Speedup Ratio: -x
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
